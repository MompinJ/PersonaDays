<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PersonaDays · Pantalla de Carga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Barlow+Condensed:wght@500;600;700&family=Big+Shoulders+Display:wght@600;700;800;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ background:#04070D; overflow:hidden; font-family:'Exo 2',sans-serif;
    -webkit-tap-highlight-color:transparent; display:flex; align-items:center; justify-content:center; min-height:100vh; }

  #viewport{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  #stage{
    position:relative; width:460px; height:940px; transform-origin:center center; overflow:hidden;
    /* theme tokens — overwritten by JS per character */
    --acc:#00D4FF; --acc2:#0E80B8; --acc-lo:#06506F; --acc-hi:#9EEBFF;
    --ink:#0A1628; --ink2:#050C18; --surface:#12243D;
    --text:#EAF2FF; --dim:#7E90BC; --faint:#3C4D6E; --ink-on:#04131A;
    --glow:rgba(0,212,255,.30);
    background:
      radial-gradient(130% 70% at 50% -6%, color-mix(in srgb,var(--acc) 20%, var(--ink)) 0%, var(--ink) 56%),
      radial-gradient(90% 55% at 50% 112%, color-mix(in srgb,var(--acc) 8%, var(--ink2)) 0%, transparent 60%),
      var(--ink2);
    color:var(--text); font-feature-settings:"kern" 1;
    transition:--acc .4s, background .4s;
  }
  /* scanline + grit */
  #stage::before{ content:""; position:absolute; inset:0; pointer-events:none; z-index:1; opacity:.55;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,.014) 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay; }
  /* vignette */
  #stage::after{ content:""; position:absolute; inset:0; pointer-events:none; z-index:9;
    background:radial-gradient(120% 100% at 50% 42%, transparent 56%, rgba(2,5,11,.66) 100%); }

  .skb{ transform:skewX(-10deg); } .uskb{ display:inline-block; transform:skewX(10deg); }

  /* ===== background decor ===== */
  .bg{ position:absolute; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  /* drifting diagonal speed-shards */
  .speed{ position:absolute; left:-30%; width:160%; height:2px; transform:skewY(-12deg);
    background:linear-gradient(90deg, transparent, color-mix(in srgb,var(--acc) 34%, transparent), transparent);
    opacity:.5; animation:drift linear infinite; }
  @keyframes drift{ from{ transform:translateX(-12%) skewY(-12deg);} to{ transform:translateX(12%) skewY(-12deg);} }
  /* giant watermark roman numerals */
  .wm-rom{ position:absolute; right:-4%; top:50%; transform:translateY(-50%) skewX(-7deg);
    font-family:'Big Shoulders Display'; font-weight:900; font-size:520px; line-height:.8; color:transparent;
    -webkit-text-stroke:2px color-mix(in srgb,var(--acc) 9%, transparent); white-space:nowrap; opacity:.9; }
  /* rotating sigil ring */
  .ring{ position:absolute; left:50%; top:34%; width:520px; height:520px; transform:translate(-50%,-50%);
    opacity:.16; animation:spin 80s linear infinite; }
  @keyframes spin{ to{ transform:translate(-50%,-50%) rotate(360deg);} }
  /* rueda ritual emblem — slow rotating tick ring */
  @keyframes ruedaspin{ to{ transform:rotate(360deg);} }
  .rueda-spin{ transform-origin:75px 75px; animation:ruedaspin 42s linear infinite; }

  /* ===== center column ===== */
  .center{ position:absolute; inset:0; z-index:5; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:30px; padding:0 40px; }

  .seq{ opacity:0; }                 /* entrance targets, revealed by JS */
  .reveal .seq{ animation:rise .7s cubic-bezier(.2,.7,.3,1) both; }
  @keyframes rise{ from{ opacity:0; transform:translateY(16px);} to{ opacity:1; transform:none;} }

  /* eyebrow */
  .eyebrow{ display:flex; align-items:center; gap:10px; font-family:'Barlow Condensed'; font-weight:700;
    font-size:12px; letter-spacing:.3em; color:var(--acc); text-transform:uppercase; transform:skewX(-8deg);
    white-space:nowrap; }
  .eyebrow .tick{ width:22px; height:3px; background:var(--acc); transform:skewX(8deg); box-shadow:0 0 12px var(--acc); }

  /* ===== emblem (shard / luna / penta) ===== */
  .emblem{ position:relative; width:150px; height:150px; display:grid; place-items:center; }
  .emblem .halo{ position:absolute; inset:-30px; border-radius:50%;
    background:radial-gradient(closest-side, var(--glow), transparent 70%);
    animation:pulse 3.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.7; transform:scale(.96);} 50%{ opacity:1; transform:scale(1.06);} }

  /* shard variant */
  .em-shard{ position:relative; width:124px; height:124px; }
  .em-shard .body{ position:absolute; inset:0; background:var(--acc);
    clip-path:polygon(15% 0,100% 0,85% 100%,0 100%); box-shadow:9px 9px 0 var(--acc-lo); }
  .em-shard .notch{ position:absolute; top:0; right:0; width:0; height:0;
    border-top:20px solid var(--ink2); border-left:20px solid transparent; }
  .em-shard .mono{ position:absolute; inset:0; display:grid; place-items:center; font-family:'Anton';
    font-size:80px; color:var(--ink-on); transform:skewX(-9deg); text-shadow:0 2px 0 rgba(255,255,255,.22); }

  /* shared name + tagline */
  .wordmark{ font-family:'Anton'; font-size:46px; line-height:.84; letter-spacing:.01em; text-transform:uppercase;
    transform:skewX(-8deg); text-align:center; text-shadow:0 4px 0 rgba(0,0,0,.5); }
  .wordmark .p{ color:var(--text); }
  .wordmark .d{ color:var(--acc); text-shadow:0 0 26px var(--glow), 0 4px 0 rgba(0,0,0,.5); }
  .tagline{ display:flex; align-items:center; gap:12px; font-family:'Bebas Neue'; font-size:22px;
    letter-spacing:.34em; color:var(--dim); transform:skewX(-7deg); text-transform:uppercase; white-space:nowrap; }
  .tagline .ln{ width:30px; height:2px; background:color-mix(in srgb,var(--acc) 60%, transparent); }

  /* ===== loader (bottom) ===== */
  .loader{ position:absolute; left:0; right:0; bottom:74px; z-index:6; padding:0 40px;
    display:flex; flex-direction:column; gap:14px; }
  .ld-top{ display:flex; align-items:flex-end; justify-content:space-between; }
  .ld-now{ display:flex; align-items:center; gap:9px; font-family:'Barlow Condensed'; font-weight:700;
    font-size:13px; letter-spacing:.28em; color:var(--text); text-transform:uppercase; transform:skewX(-8deg); }
  .ld-now .dot{ width:8px; height:8px; background:var(--acc); transform:rotate(45deg);
    box-shadow:0 0 10px var(--acc); animation:blink 1s steps(2) infinite; }
  @keyframes blink{ 50%{ opacity:.25; } }
  .ld-pct{ font-family:'Big Shoulders Display'; font-weight:900; font-size:54px; line-height:.8;
    letter-spacing:.01em; transform:skewX(-8deg); color:var(--text); }
  .ld-pct .z{ color:var(--faint); }
  .ld-pct .s{ font-size:26px; color:var(--acc); margin-left:2px; }

  /* angular track */
  .ld-track{ position:relative; height:16px; transform:skewX(-12deg); background:rgba(255,255,255,.04);
    border:1.5px solid color-mix(in srgb,var(--acc) 26%, var(--faint)); overflow:hidden; }
  .ld-fill{ position:absolute; inset:0; right:auto; width:0%; background:var(--acc);
    box-shadow:0 0 18px var(--glow); transition:width .18s linear; }
  .ld-fill::after{ content:""; position:absolute; top:0; bottom:0; right:0; width:40px;
    background:linear-gradient(90deg, transparent, var(--acc-hi)); opacity:.8; }
  /* tick marks over track */
  .ld-ticks{ position:absolute; inset:0; display:flex; }
  .ld-ticks i{ flex:1; border-right:1px solid rgba(4,7,13,.55); }
  .ld-ticks i:last-child{ border:0; }

  .ld-sub{ display:flex; align-items:center; justify-content:space-between;
    font-family:'Barlow Condensed'; font-weight:600; font-size:11px; letter-spacing:.18em;
    color:var(--faint); text-transform:uppercase; }
  .ld-sub .hint{ color:var(--dim); }

  /* SEES tab top-left */
  .sees{ position:absolute; top:30px; left:30px; z-index:7; display:flex; align-items:center; gap:8px;
    font-family:'Barlow Condensed'; font-weight:700; font-size:11px; letter-spacing:.26em; color:var(--dim);
    text-transform:uppercase; transform:skewX(-8deg); }
  .sees .bar{ width:5px; height:16px; background:var(--acc); box-shadow:0 0 10px var(--acc); }
  .ver{ position:absolute; top:30px; right:30px; z-index:7; font-family:'Big Shoulders Display'; font-weight:700;
    font-size:13px; letter-spacing:.1em; color:var(--faint); transform:skewX(-8deg); }

  @media (prefers-reduced-motion: reduce){
    .speed, .ring, .halo, .ld-now .dot, .rueda-spin{ animation:none !important; }
    .reveal .seq{ animation:none !important; opacity:1 !important; }
  }
</style>
</head>
<body>
<div id="viewport"><div id="stage"></div></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="carga-app.jsx"></script>
</body>
</html>
