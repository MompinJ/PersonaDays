<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PersonaDays · Choose Your Destiny</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Barlow+Condensed:wght@500;600;700&family=Big+Shoulders+Display:wght@600;700;800;900&family=Exo+2:wght@400;600;700&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
<script src="image-slot.js"></script>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:#04060c; overflow:hidden;
    font-family:'Exo 2',sans-serif; color:#fff;
    -webkit-tap-highlight-color:transparent;
    display:flex; align-items:center; justify-content:center; min-height:100vh;
  }

  /* ---- fixed canvas, scaled to viewport ---- */
  #viewport{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  #stage{
    position:relative; width:460px; height:940px; transform-origin:center center;
    /* themed tokens (mutate per character) */
    --primary:#00D4FF; --secondary:#007ACC; --bg:#0A1628; --surface:#12243D;
    --text:#FFFFFF; --dim:#8892B0; --inverse:#000000; --border:#2A4466;
    --glow:rgba(0,212,255,.25);
    /* tweakables */
    --bgname-op:.13; --skew:-9deg; --glow-mult:1; --tagline-show:1;
    --name-font:'Anton';
    background:
      radial-gradient(130% 70% at 50% -8%, color-mix(in srgb, var(--primary) 16%, var(--bg)) 0%, var(--bg) 55%),
      var(--bg);
    overflow:hidden;
    font-feature-settings:"kern" 1;
    transition:background .05s linear;
  }

  /* atmospheric speckle + scanline grit */
  #stage::before{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:0; opacity:.5;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay;
  }

  /* ============ HEADER ============ */
  .hdr{ position:absolute; top:0; left:0; right:0; z-index:30; padding:26px 30px 0;
    display:flex; align-items:flex-start; justify-content:space-between; }
  .hdr-l{ display:flex; flex-direction:column; gap:4px; }
  .eyebrow{ display:flex; align-items:center; gap:8px; font-family:'Barlow Condensed';
    font-weight:700; font-size:12px; letter-spacing:.28em; color:var(--primary);
    text-transform:uppercase; transform:skewX(-8deg); white-space:nowrap; }
  .eyebrow .tick{ width:22px; height:3px; background:var(--primary); transform:skewX(8deg);
    box-shadow:0 0 10px var(--glow); }
  .hdr-title{ font-family:'Anton'; font-size:34px; line-height:.9; letter-spacing:.005em;
    transform:skewX(-7deg); text-transform:uppercase;
    color:var(--text); text-shadow:0 3px 0 rgba(0,0,0,.45); }
  .hdr-title em{ font-style:normal; color:var(--primary);
    text-shadow:0 0 22px var(--glow), 0 3px 0 rgba(0,0,0,.45); }
  .hdr-r{ text-align:right; font-family:'Big Shoulders Display'; transform:skewX(-7deg); }
  .idx-now{ font-weight:900; font-size:46px; line-height:.8; color:var(--primary);
    text-shadow:0 0 20px var(--glow); }
  .idx-tot{ font-weight:700; font-size:18px; color:var(--dim); letter-spacing:.08em; }

  /* ============ CARD ============ */
  .card-wrap{ position:absolute; left:50%; top:104px; transform:translateX(-50%);
    width:392px; height:632px; z-index:20; cursor:grab; touch-action:pan-y; }
  .card-wrap:active{ cursor:grabbing; }
  .card{ will-change:transform; }

  /* arrows live OUTSIDE the scaled card so they stay tappable */
  .nav{ position:absolute; top:50%; transform:translateY(-50%); z-index:35;
    width:46px; height:88px; border:0; cursor:pointer; background:transparent;
    display:grid; place-items:center; color:var(--text); }
  .nav .glyph{ width:38px; height:78px; background:var(--surface);
    border:2px solid var(--border); display:grid; place-items:center;
    color:var(--primary); transition:border-color .16s ease, box-shadow .16s ease, transform .12s ease;
    box-shadow:6px 6px 0 rgba(0,0,0,.5); }
  .nav.prev .glyph{ clip-path:polygon(100% 0,100% 100%,0 88%,18% 50%,0 12%); }
  .nav.next .glyph{ clip-path:polygon(0 0,82% 12%,100% 50%,82% 88%,0 100%); }
  .nav:hover .glyph{ border-color:var(--primary); background:color-mix(in srgb,var(--primary) 14%,var(--surface));
    box-shadow:6px 6px 0 var(--glow); }
  .nav:active .glyph{ transform:translate(3px,3px); box-shadow:2px 2px 0 rgba(0,0,0,.5); }
  .nav svg{ width:18px; height:18px; }
  .nav.prev{ left:-2px; }
  .nav.next{ right:-2px; }

  /* neon frame = outer primary shape + inset bg shape */
  .card{ position:absolute; inset:0;
    --cut:30px;
    clip-path:polygon(0 0, calc(100% - var(--cut)) 0, 100% var(--cut), 100% 100%, var(--cut) 100%, 0 calc(100% - var(--cut)));
    background:
      linear-gradient(150deg, var(--primary), color-mix(in srgb,var(--primary) 55%, var(--secondary)) 100%);
    filter:drop-shadow(0 18px 34px rgba(0,0,0,.6))
           drop-shadow(0 0 calc(26px * var(--glow-mult)) var(--glow));
  }
  .card-inner{ position:absolute; inset:3px;
    --cut:28px;
    clip-path:polygon(0 0, calc(100% - var(--cut)) 0, 100% var(--cut), 100% 100%, var(--cut) 100%, 0 calc(100% - var(--cut)));
    background:
      radial-gradient(120% 90% at 50% 120%, color-mix(in srgb,var(--primary) 20%, var(--bg)) 0%, var(--bg) 60%),
      var(--bg);
    overflow:hidden;
  }

  /* layer: giant background romaji, bleeding + cut diagonally */
  .bg-romaji{ position:absolute; left:-12%; top:13%; z-index:1;
    font-family:var(--name-font); font-size:188px; line-height:.74; letter-spacing:-.02em;
    color:var(--primary); opacity:var(--bgname-op); transform:skewX(var(--skew)) rotate(-3deg);
    text-transform:uppercase; white-space:nowrap; pointer-events:none;
    -webkit-text-stroke:0; user-select:none;
  }
  /* layer: giant background katakana lower, even fainter */
  .bg-kata{ position:absolute; right:-6%; bottom:16%; z-index:1;
    font-family:'Noto Sans JP'; font-weight:900; font-size:128px; line-height:.78;
    color:var(--text); opacity:calc(var(--bgname-op) * .55); writing-mode:vertical-rl;
    letter-spacing:.04em; pointer-events:none; user-select:none;
    transform:skewY(-4deg); }

  /* layer: diagonal velvet ribbon behind the figure */
  .ribbon{ position:absolute; left:-30%; top:34%; width:160%; height:160px; z-index:2;
    background:linear-gradient(90deg,
      transparent, color-mix(in srgb,var(--secondary) 85%, #000) 12%,
      var(--secondary) 50%, color-mix(in srgb,var(--secondary) 85%, #000) 88%, transparent);
    transform:rotate(-21deg); opacity:.5; pointer-events:none;
    box-shadow:0 0 50px color-mix(in srgb,var(--secondary) 60%, transparent); }
  .ribbon.thin{ top:60%; height:30px; left:-20%; width:140%; transform:rotate(-21deg);
    background:var(--primary); opacity:.45; box-shadow:0 0 24px var(--glow); }

  /* layer: spotlight glow where the figure stands */
  .spotlight{ position:absolute; left:50%; bottom:-6%; width:380px; height:480px; z-index:2;
    transform:translateX(-50%);
    background:radial-gradient(closest-side, var(--glow), transparent 72%);
    opacity:calc(.9 * var(--glow-mult)); pointer-events:none; }

  /* layer: stylized silhouette (shows through empty portrait) */
  .silhouette{ position:absolute; left:50%; bottom:0; width:300px; height:430px; z-index:3;
    transform:translateX(-50%);
    background:linear-gradient(180deg,
      color-mix(in srgb,var(--primary) 30%, #060912) 0%,
      color-mix(in srgb,var(--secondary) 22%, #04060c) 60%,
      transparent 100%);
    clip-path:polygon(
      42% 8%, 58% 8%, 62% 14%, 62% 22%, 70% 26%, 74% 34%,
      82% 50%, 86% 74%, 90% 100%, 10% 100%, 14% 74%, 18% 50%,
      26% 34%, 30% 26%, 38% 22%, 38% 14%);
    opacity:.85; pointer-events:none;
    -webkit-mask-image:linear-gradient(180deg,#000 62%, transparent 96%);
            mask-image:linear-gradient(180deg,#000 62%, transparent 96%);
  }

  /* layer: the drop-art portrait (transparent so silhouette + name show when empty) */
  .portrait{ position:absolute; left:0; right:0; bottom:0; top:8%; z-index:4; }
  image-slot{ width:100%; height:100%; display:block; color:var(--dim); }
  image-slot::part(frame){ background:transparent; }
  image-slot::part(ring){ display:none; }
  image-slot::part(empty){ color:color-mix(in srgb,var(--primary) 70%, var(--text)); }

  /* layer: bottom scrim so the nameplate reads */
  .scrim{ position:absolute; left:0; right:0; bottom:0; height:62%; z-index:5; pointer-events:none;
    background:linear-gradient(180deg, transparent 0%,
      color-mix(in srgb,var(--bg) 60%, transparent) 42%,
      color-mix(in srgb,var(--bg) 96%, transparent) 78%, var(--bg) 100%); }

  /* layer: vertical katakana strip down the right edge */
  .kata-strip{ position:absolute; right:14px; top:60px; z-index:7;
    writing-mode:vertical-rl; font-family:'Noto Sans JP'; font-weight:700;
    font-size:23px; letter-spacing:.34em; color:var(--text); opacity:.72;
    text-shadow:0 0 14px rgba(0,0,0,.7);
    border-right:2px solid var(--primary); padding-right:6px; }

  /* layer: index number, big outline, top-left */
  .card-no{ position:absolute; left:16px; top:14px; z-index:7;
    font-family:'Big Shoulders Display'; font-weight:900; font-size:74px; line-height:.8;
    color:transparent; -webkit-text-stroke:2px color-mix(in srgb,var(--primary) 80%, transparent);
    letter-spacing:-.02em; opacity:.85; }

  /* foreground info column — anchored bottom-left, never collides */
  .info{ position:absolute; left:0; right:0; bottom:30px; z-index:8;
    padding:0 24px; display:flex; flex-direction:column; align-items:flex-start; gap:11px; }
  .info .arc{ font-family:'Barlow Condensed'; font-weight:700; font-size:15px;
    letter-spacing:.32em; color:var(--primary); text-transform:uppercase;
    transform:skewX(var(--skew)); text-shadow:0 0 14px var(--glow); }
  .name-row{ display:flex; flex-direction:column; align-items:flex-start; gap:1px; }
  .name{ position:relative; display:inline-block;
    font-family:var(--name-font); font-size:74px; line-height:.86; letter-spacing:.004em;
    text-transform:uppercase; transform:skewX(var(--skew));
    color:var(--text); text-shadow:0 4px 0 rgba(0,0,0,.5); margin-left:14px; white-space:nowrap; }
  /* accent slab fused to the name, touching the frame edge */
  .name::before{ content:""; position:absolute; left:-16px; top:6%; width:9px; height:86%;
    background:var(--primary); box-shadow:0 0 18px var(--glow); transform:skewX(var(--skew)); }
  .surname{ font-family:'Bebas Neue'; font-size:24px; letter-spacing:.18em;
    color:var(--dim); transform:skewX(var(--skew)); margin-left:16px; }

  /* tagline shard banner */
  .tag{ display:flex; opacity:var(--tagline-show); margin-left:14px; }
  .tag .shard{ position:relative; background:var(--primary); color:var(--inverse);
    font-family:'Bebas Neue'; font-size:25px; letter-spacing:.07em; line-height:1; white-space:nowrap;
    padding:8px 22px 8px 16px; transform:skewX(var(--skew));
    box-shadow:5px 5px 0 color-mix(in srgb,var(--secondary) 90%, #000); }
  .tag .shard span{ display:inline-block; transform:skewX(calc(-1 * var(--skew))); }

  /* descriptor meta line */
  .descriptor{ font-family:'Barlow Condensed'; font-weight:600; font-size:15px; letter-spacing:.2em;
    color:var(--text); text-transform:uppercase; transform:skewX(var(--skew)); opacity:.86; margin-left:14px; white-space:nowrap; }
  .descriptor b{ color:var(--primary); }

  /* staggered entrance on swap */
  .info.swap > *{ animation:swapUp .42s cubic-bezier(.2,.7,.3,1) both; }
  .info.swap > *:nth-child(2){ animation-delay:.05s; }
  .info.swap > *:nth-child(3){ animation-delay:.10s; }
  .info.swap > *:nth-child(4){ animation-delay:.15s; }

  /* corner ticks on the frame */
  .frame-tick{ position:absolute; z-index:10; background:var(--primary); box-shadow:0 0 10px var(--glow); }
  .frame-tick.tr{ right:30px; top:0; width:54px; height:3px; transform-origin:right;
    transform:rotate(45deg) translateX(0); }

  /* ============ FOOTER ============ */
  .footer{ position:absolute; left:0; right:0; bottom:0; z-index:30; padding:0 30px 26px;
    display:flex; flex-direction:column; align-items:center; gap:16px; }
  .dots{ display:flex; gap:9px; align-items:center; justify-content:center; flex-wrap:wrap;
    max-width:380px; }
  .dot{ width:18px; height:18px; padding:0; border:2px solid rgba(255,255,255,.22);
    background:transparent; cursor:pointer; transform:skewX(-10deg);
    transition:border-color .16s ease, box-shadow .16s ease, transform .16s ease; }
  .dot:hover{ border-color:rgba(255,255,255,.55); }
  .dot.on{ border-color:#fff; background:currentColor;
    box-shadow:0 0 12px currentColor; transform:skewX(-10deg) scale(1.08); }

  .confirm{ position:relative; width:300px; height:60px; border:0; cursor:pointer;
    background:transparent; font-family:'Anton'; font-size:27px; letter-spacing:.05em;
    text-transform:uppercase; color:var(--inverse); }
  .confirm .fill{ position:absolute; inset:0; background:var(--primary);
    clip-path:polygon(4% 0,100% 0,96% 100%,0 100%);
    box-shadow:6px 6px 0 color-mix(in srgb,var(--secondary) 90%,#000), 0 0 26px var(--glow);
    transition:box-shadow .16s ease, filter .16s ease, transform .12s ease; }
  .confirm .lbl{ position:relative; display:flex; align-items:center; justify-content:center;
    gap:12px; height:100%; transform:skewX(-9deg); }
  .confirm .lbl svg{ width:22px; height:22px; }
  .confirm:hover .fill{ filter:brightness(1.08); box-shadow:8px 8px 0 color-mix(in srgb,var(--secondary) 90%,#000), 0 0 36px var(--glow); }
  .confirm:active .fill{ transform:translate(4px,4px); box-shadow:2px 2px 0 color-mix(in srgb,var(--secondary) 90%,#000); }

  /* ============ SHARD FLASH (hard-cut transition, full-screen) ============ */
  .flash{ position:absolute; inset:0; z-index:90; pointer-events:none; opacity:0;
    background:radial-gradient(120% 80% at 50% 45%, var(--glow), transparent 72%); }
  .flash .blade{ position:absolute; top:-4%; bottom:-4%; width:62%;
    background:linear-gradient(90deg, transparent, var(--primary) 28%, #fff 50%, var(--primary) 72%, transparent);
    transform:skewX(-14deg) translateX(-160%); filter:blur(1px); mix-blend-mode:screen; }
  .flash.go{ animation:flashOp .34s ease both; }
  .flash.go .blade{ animation:blade .34s cubic-bezier(.7,0,.3,1) both; }
  @keyframes flashOp{ 0%{opacity:0} 14%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
  @keyframes blade{ 0%{ transform:skewX(-14deg) translateX(-170%);} 100%{ transform:skewX(-14deg) translateX(220%);} }

  /* content swap pop */
  .swap-in{ animation:swapIn .42s cubic-bezier(.2,.7,.3,1) both; }
  @keyframes swapIn{ from{ opacity:0; transform:translateX(26px); } to{ opacity:1; transform:none; } }
  .swap-in.up{ animation-name:swapUp; }
  @keyframes swapUp{ from{ opacity:0; transform:translateY(20px); } to{ opacity:1; transform:none; } }

  @media (prefers-reduced-motion: reduce){
    .flash.go,.flash.go .blade,.swap-in{ animation-duration:.01ms !important; }
  }
</style>
</head>
<body>
<div id="viewport">
  <div id="stage" data-screen-label="Character Select">

    <!-- HEADER -->
    <div class="hdr">
      <div class="hdr-l">
        <div class="eyebrow"><span class="tick"></span>SELECT · PROTAGONIST</div>
        <div class="hdr-title">CHOOSE YOUR<br><em>DESTINY</em></div>
      </div>
      <div class="hdr-r">
        <div class="idx-now" id="idxNow">01</div>
        <div class="idx-tot" id="idxTot">/ 11</div>
      </div>
    </div>

    <!-- CARD -->
    <div class="card-wrap">
      <button class="nav prev" id="prev" aria-label="Anterior">
        <span class="glyph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5 8 12l7 7"/></svg></span>
      </button>
      <button class="nav next" id="next" aria-label="Siguiente">
        <span class="glyph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg></span>
      </button>

      <div class="card">
        <div class="card-inner" id="inner">
          <div class="bg-romaji" id="bgRomaji">MAKOTO</div>
          <div class="bg-kata" id="bgKata">マコト</div>
          <div class="ribbon"></div>
          <div class="ribbon thin"></div>
          <div class="spotlight"></div>
          <div class="silhouette"></div>
          <div class="portrait">
            <image-slot id="art-makoto" shape="rect" placeholder="DROP ART"></image-slot>
          </div>
          <div class="scrim"></div>

          <div class="kata-strip" id="kataStrip">マコト</div>

          <div class="info" id="info">
            <div class="arc" id="pArc">SEES · FIELD LEADER</div>
            <div class="name-row">
              <span class="name" id="pName">MAKOTO</span>
              <span class="surname" id="pSurname">YUKI</span>
            </div>
            <div class="tag" id="tag"><div class="shard"><span id="pTag">MEMENTO MORI</span></div></div>
            <div class="descriptor" id="pDesc"><b>WILD CARD</b> · THE FOOL</div>
          </div>

          <div class="frame-tick tr"></div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div class="dots" id="dots"></div>
      <button class="confirm" id="confirm">
        <span class="fill"></span>
        <span class="lbl">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>
          I AM THOU
        </span>
      </button>
    </div>

    <!-- full-screen flash (covers header, card, selectors, button) -->
    <div class="flash" id="flash"><div class="blade"></div></div>

  </div>
</div>

<div id="tweaks-root"></div>

<script src="character-data.js"></script>
<script src="character-select.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tweaks-app.jsx"></script>
</body>
</html>
