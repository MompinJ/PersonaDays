<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PersonaDays · Logo v3 · 8 ideas nuevas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Barlow+Condensed:wght@500;600;700&family=Big+Shoulders+Display:wght@600;700;800;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{ font-family:'Exo 2',sans-serif; background:#11151c; }

  .lg-stage{
    position:absolute; inset:0; overflow:hidden;
    --ink:#0A1628; --ink2:#06101E; --acc:#00D4FF; --acc2:#0E80B8; --acc-lo:#055E86;
    --acc-hi:#9EEBFF; --text:#EAF2FF; --dim:#7E90BC; --faint:#445574; --ink-on:#04131A;
    background:
      radial-gradient(120% 75% at 50% -8%, color-mix(in srgb,var(--acc) 16%, var(--ink)) 0%, var(--ink) 58%),
      var(--ink2);
    color:var(--text);
    display:flex; flex-direction:column; align-items:center; justify-content:space-between;
    padding:34px 26px 22px;
  }
  .lg-stage::before{ content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay; }
  .lg-hero{ flex:1 1 auto; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; width:100%; z-index:2; }
  .lg-eyebrow{ font-family:'Barlow Condensed'; font-weight:700; font-size:11px; letter-spacing:.38em;
    color:var(--acc); text-transform:uppercase; transform:skewX(-8deg); text-align:center; white-space:nowrap; }

  .em-wrap{ position:relative; display:grid; place-items:center; }
  .em-glow{ filter:drop-shadow(0 0 22px color-mix(in srgb,var(--acc) 55%, transparent)); }

  .lg-wm{ font-family:'Anton'; line-height:.86; letter-spacing:.01em; text-transform:uppercase;
    transform:skewX(-8deg); text-align:center; text-shadow:0 3px 0 rgba(0,0,0,.5); font-size:30px; }
  .lg-wm .p{ color:var(--text); }
  .lg-wm .d{ color:var(--acc); text-shadow:0 0 24px color-mix(in srgb,var(--acc) 50%, transparent), 0 3px 0 rgba(0,0,0,.5); }

  .lg-foot{ display:flex; align-items:center; gap:14px; width:100%; z-index:2;
    border-top:1px solid color-mix(in srgb,var(--acc) 14%, transparent); padding-top:15px; }
  .lg-squircle{ width:56px; height:56px; flex:0 0 56px; border-radius:14px; position:relative; overflow:hidden;
    background:linear-gradient(150deg, #102544, var(--ink2)); border:1px solid color-mix(in srgb,var(--acc) 26%, transparent);
    display:grid; place-items:center; box-shadow:0 6px 18px rgba(0,0,0,.5); }
  .lg-foot-txt{ display:flex; flex-direction:column; gap:3px; }
  .lg-foot-lab{ font-family:'Bebas Neue'; font-size:16px; letter-spacing:.12em; color:var(--text); }
  .lg-foot-sub{ font-family:'Barlow Condensed'; font-weight:600; font-size:10.5px; letter-spacing:.16em;
    color:var(--dim); text-transform:uppercase; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="logo-v3.jsx"></script>
</body>
</html>
